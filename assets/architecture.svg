<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="telegramGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2AABEE" />
      <stop offset="100%" style="stop-color:#229ED9" />
    </linearGradient>
    <linearGradient id="dockerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2496ED" />
      <stop offset="100%" style="stop-color:#1D7CC8" />
    </linearGradient>
    <linearGradient id="proxyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35" />
      <stop offset="100%" style="stop-color:#E55A2B" />
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8" />
      <stop offset="100%" style="stop-color:#0096C7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowRight" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#8899AA"/>
    </marker>
    <marker id="arrowRightBlue" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#2AABEE"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" fill="#E8EDF2" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">系统架构图</text>
  <text x="450" y="62" text-anchor="middle" fill="#8899AA" font-family="system-ui, sans-serif" font-size="13">System Architecture</text>

  <!-- 区域划分 -->
  <!-- 外部网络 -->
  <rect x="30" y="80" width="260" height="370" rx="12" fill="none" stroke="#2AABEE" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="160" y="105" text-anchor="middle" fill="#2AABEE" font-family="system-ui, sans-serif" font-size="12" opacity="0.7">Telegram 云端</text>

  <!-- Docker 主机 -->
  <rect x="320" y="80" width="560" height="370" rx="12" fill="none" stroke="#2496ED" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="600" y="105" text-anchor="middle" fill="#2496ED" font-family="system-ui, sans-serif" font-size="12" opacity="0.7">Docker 主机</text>

  <!-- ============ 组件 1: Telegram ============ -->
  <g filter="url(#shadow)">
    <rect x="50" y="140" width="220" height="180" rx="14" fill="#1E2A36"/>
    <rect x="50" y="140" width="220" height="40" rx="14" fill="url(#telegramGrad)"/>
    <rect x="50" y="166" width="220" height="14" fill="url(#telegramGrad)"/>
  </g>
  
  <!-- Telegram 图标 -->
  <circle cx="80" cy="160" r="12" fill="#fff" opacity="0.2"/>
  <path d="M76,157 L88,163 L76,164 Z M76,163 L78,161 M88,163 L76,169 L80,164" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <text x="110" y="165" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Telegram 云端</text>
  
  <text x="160" y="200" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="12">用户向</text>
  <text x="160" y="218" text-anchor="middle" fill="#E8EDF2" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">「已保存消息」</text>
  <text x="160" y="236" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="12">发送视频 / 文档</text>

  <!-- 视频/文档图标 -->
  <rect x="115" y="255" width="90" height="40" rx="6" fill="#2AABEE" opacity="0.15"/>
  <text x="160" y="275" text-anchor="middle" fill="#2AABEE" font-family="system-ui, sans-serif" font-size="11">📹 video.mp4</text>
  <text x="160" y="290" text-anchor="middle" fill="#2AABEE" font-family="system-ui, sans-serif" font-size="10">📄 document.pdf</text>

  <!-- ============ 箭头 1 → 2 ============ -->
  <line x1="270" y1="230" x2="350" y2="230" stroke="#2AABEE" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowRightBlue)"/>
  <text x="310" y="222" text-anchor="middle" fill="#2AABEE" font-family="system-ui, sans-serif" font-size="10">MTProto</text>

  <!-- ============ 组件 2: Bot 容器 ============ -->
  <g filter="url(#shadow)">
    <rect x="355" y="130" width="220" height="200" rx="14" fill="#1E2A36"/>
    <rect x="355" y="130" width="220" height="40" rx="14" fill="url(#dockerGrad)"/>
    <rect x="355" y="156" width="220" height="14" fill="url(#dockerGrad)"/>
  </g>
  
  <!-- Docker 图标 -->
  <rect x="380" y="148" width="22" height="16" rx="3" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <rect x="385" y="145" width="4" height="8" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="393" y="145" width="4" height="8" rx="1" fill="#fff" opacity="0.6"/>
  
  <text x="415" y="165" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">TG Bot 容器</text>
  
  <text x="465" y="195" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="11">监听已保存消息</text>
  <text x="465" y="213" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="11">识别视频 / 文档</text>
  <text x="465" y="231" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="11">调用 Telethon 下载</text>
  
  <!-- 容器内小标签 -->
  <rect x="395" y="250" width="140" height="24" rx="6" fill="#2496ED" opacity="0.15"/>
  <text x="465" y="267" text-anchor="middle" fill="#2496ED" font-family="monospace" font-size="10">bot.py 主程序</text>
  
  <rect x="395" y="280" width="140" height="24" rx="6" fill="#2496ED" opacity="0.15"/>
  <text x="465" y="297" text-anchor="middle" fill="#2496ED" font-family="monospace" font-size="10">entrypoint.sh 启动</text>

  <!-- ============ 箭头 2 → 3 ============ -->
  <line x1="575" y1="200" x2="650" y2="200" stroke="#8899AA" stroke-width="2.5" marker-end="url(#arrowRight)"/>
  <text x="612" y="192" text-anchor="middle" fill="#8899AA" font-family="system-ui, sans-serif" font-size="10">SOCKS5</text>

  <!-- ============ 组件 3: 代理 ============ -->
  <g filter="url(#shadow)">
    <rect x="655" y="130" width="200" height="160" rx="14" fill="#1E2A36"/>
    <rect x="655" y="130" width="200" height="40" rx="14" fill="url(#proxyGrad)"/>
    <rect x="655" y="156" width="200" height="14" fill="url(#proxyGrad)"/>
  </g>
  
  <text x="680" y="165" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">代理（可选）</text>
  
  <text x="755" y="195" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="11">SOCKS5 代理</text>
  <text x="755" y="213" text-anchor="middle" fill="#AABBCC" font-family="system-ui, sans-serif" font-size="11">Clash / Shadowsocks</text>
  
  <rect x="700" y="235" width="110" height="30" rx="6" fill="#FF6B35" opacity="0.15"/>
  <text x="755" y="254" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="10">127.0.0.1:7890</text>

  <!-- ============ 箭头 3 → 4 ============ -->
  <path d="M630,370 L630,420 L465,420" stroke="#8899AA" stroke-width="2.5" fill="none" marker-end="url(#arrowRight)"/>
  <text x="550" y="432" text-anchor="middle" fill="#8899AA" font-family="system-ui, sans-serif" font-size="10">写入文件</text>

  <!-- 从 Bot 到下载的箭头 -->
  <path d="M465,330 L465,360" stroke="#00B4D8" stroke-width="2.5" fill="none" marker-end="url(#arrowRight)"/>
  <text x="490" y="355" text-anchor="middle" fill="#00B4D8" font-family="system-ui, sans-serif" font-size="10">自动保存</text>

  <!-- ============ 组件 4: 下载存储 ============ -->
  <g filter="url(#shadow)">
    <rect x="345" y="370" width="240" height="60" rx="14" fill="#1E2A36"/>
    <rect x="345" y="370" width="240" height="40" rx="14" fill="url(#storageGrad)"/>
    <rect x="345" y="396" width="240" height="14" fill="url(#storageGrad)"/>
  </g>
  
  <text x="370" y="400" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">📁 本地存储</text>
  <text x="465" y="418" text-anchor="middle" fill="#AABBCC" font-family="monospace" font-size="10">/downloads/</text>

  <!-- ============ Footer 说明 ============ -->
  <text x="450" y="480" text-anchor="middle" fill="#556677" font-family="system-ui, sans-serif" font-size="11">Bot 持续监听「已保存消息」，检测到视频/文档后自动下载到本地</text>
</svg>